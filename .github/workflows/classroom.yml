name: Autograding Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install jupyter nbconvert pytest

    - name: testnotebookimports
      id: testnotebookimports
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Test Notebook Imports"
        command: jupyter nbconvert --to notebook --execute --ExecutePreprocessor.timeout=120 notebook.ipynb --stdout
        timeout: 90
        max-score: 20

    - name: testimageload
      id: testimageload
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Test Image Load"
        command: jupyter nbconvert --to notebook --execute --ExecutePreprocessor.timeout=120 notebook.ipynb --stdout
        timeout: 90
        max-score: 20

    - name: testimageproperties
      id: testimageproperties
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Test Image Properties"
        command: jupyter nbconvert --to notebook --execute --ExecutePreprocessor.timeout=120 notebook.ipynb --stdout
        timeout: 90
        max-score: 20

    - name: testimageconversion
      id: testimageconversion
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Test Image Conversion"
        command: jupyter nbconvert --to notebook --execute --ExecutePreprocessor.timeout=120 notebook.ipynb --stdout
        timeout: 90
        max-score: 20

    - name: testimagedisplay
      id: testimagedisplay
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Test Image Display"
        command: jupyter nbconvert --to notebook --execute --ExecutePreprocessor.timeout=120 notebook.ipynb --stdout
        timeout: 90
        max-score: 20

    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        TESTNOTEBOOKIMPORTS_RESULTS: "${{steps.testnotebookimports.outputs.result}}"
        TESTIMAGELOAD_RESULTS: "${{steps.testimageload.outputs.result}}"
        TESTIMAGEPROPERTIES_RESULTS: "${{steps.testimageproperties.outputs.result}}"
        TESTIMAGECONVERSION_RESULTS: "${{steps.testimageconversion.outputs.result}}"
        TESTIMAGEDISPLAY_RESULTS: "${{steps.testimagedisplay.outputs.result}}"
      with:
        runners: testnotebookimports,testimageload,testimageproperties,testimageconversion,testimagedisplay
